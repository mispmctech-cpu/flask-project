<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - FWAPMS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pmcPurple: '#6a2c91',
            pmcPurpleDark: '#501e73',
            pmcCream: '#f8f6f2',
            pmcGreen: '#3bb273',
            pmcCard: '#fffdfa',
            pmcText: '#2d2a32',
            pmcMuted: '#bdbdbd',
            pmcBtn: '#6a2c91',
            pmcBtnHover: '#501e73',
            pmcDanger: '#c0392b',
            pmcDangerHover: '#922b21',
          },
        },
      },
    }
  </script>

  <!-- Supabase JS SDK -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <style>
    .glass-effect {
      background: rgba(255, 253, 250, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid #e5e5e5;
      box-shadow: 0 8px 32px 0 rgba(106, 44, 145, 0.10);
    }
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .responsive-logo {
      max-width: 100%;
      height: auto;
      width: clamp(150px, 40vw, 300px);
    }
    @media (max-width: 768px) {
      .responsive-logo {
        width: clamp(120px, 50vw, 200px);
      }
    }
    .compact-form {
      max-width: 400px;
    }
    @media (max-width: 640px) {
      .compact-form {
        max-width: 350px;
      }
    }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 500;
    }
    .alert-success {
      background-color: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }
    .alert-error {
      background-color: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-pmcCream" style="background: url('/static/img/pmcbg.png') no-repeat center center fixed; background-size: cover;">

  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center p-4">
    <!-- Main Container -->
    <div class="w-full max-w-6xl mx-auto px-2">
      <!-- Logo Section - Centered at top on mobile, left side on desktop -->
      <div class="logo-container lg:hidden mb-6">
        <img src="/static/img/login logo1.png" alt="PMC Tech FWAPMS Logo" class="responsive-logo bg-white p-4 rounded-lg shadow-lg">
      </div>
      
      <div class="grid lg:grid-cols-2 gap-6 lg:gap-8 items-center">
        <!-- Left Side - Branding (Hidden on mobile, shown on desktop) -->
        <div class="hidden lg:block text-white space-y-6">
          <!-- Logo for Desktop -->
          <div class="flex justify-center lg:justify-start">
            <img src="/static/img/login logo1.png" alt="PMC Tech FWAPMS Logo" class="glass-effect p-6 rounded-lg shadow-lg w-full max-w-md">
          </div>
        </div>

        <!-- Right Side - Forgot Password Form -->
        <div class="glass-effect bg-pmcCard shadow-lg rounded-xl p-4 sm:p-6 w-full compact-form mx-auto border border-pmcMuted/30">
          
          <!-- Back to Login Link -->
          <div class="text-left mb-4">
            <a href="login.html" class="text-pmcPurple hover:text-pmcGreen font-medium transition-colors text-sm flex items-center">
              <i class="fas fa-arrow-left mr-2"></i>Back to Login
            </a>
          </div>

          <h2 class="text-xl sm:text-2xl font-bold text-pmcPurple mb-4 sm:mb-6 text-center tracking-wide">FORGOT PASSWORD</h2>
          
          <!-- Alert Messages -->
          <div id="alert-container"></div>
          
          <!-- Step 1: Enter Email -->
          <div id="step-1">
            <p class="text-pmcText text-sm mb-4 text-center">Enter your email address to receive a verification code</p>
            
            <form id="forgot-password-form" class="space-y-4">
              <!-- Role Selection (same as login) -->
              <div class="grid grid-cols-2 gap-1.5 sm:gap-2 mb-4">
                <button type="button" data-role="ADMIN"
                  class="role-btn px-2 sm:px-3 py-1.5 sm:py-2 rounded-md font-semibold bg-pmcDanger text-white hover:bg-pmcDangerHover transition shadow border-2 border-pmcDangerHover text-xs">
                  <i class="fas fa-shield-alt mr-1"></i>Admin
                </button>
                <button type="button" data-role="MANAGEMENT"
                  class="role-btn px-2 sm:px-3 py-1.5 sm:py-2 rounded-md font-semibold bg-pmcPurple text-white hover:bg-pmcPurpleDark transition shadow text-xs">Management</button>
                <button type="button" data-role="PRINCIPAL"
                  class="role-btn px-2 sm:px-3 py-1.5 sm:py-2 rounded-md font-semibold bg-pmcPurple text-white hover:bg-pmcPurpleDark transition shadow text-xs">Principal</button>
                <button type="button" data-role="HR"
                  class="role-btn px-2 sm:px-3 py-1.5 sm:py-2 rounded-md font-semibold bg-pmcPurple text-white hover:bg-pmcPurpleDark transition shadow text-xs">HR</button>
                <button type="button" data-role="IQAC"
                  class="role-btn px-2 sm:px-3 py-1.5 sm:py-2 rounded-md font-semibold bg-pmcGreen text-white hover:bg-pmcPurple transition shadow text-xs">IQAC</button>
                <button type="button" data-role="HOD"
                  class="role-btn px-2 sm:px-3 py-1.5 sm:py-2 rounded-md font-semibold bg-pmcCream text-pmcPurple border border-pmcPurple hover:bg-pmcPurple hover:text-white transition shadow text-xs">HOD</button>
                <button type="button" data-role="FACULTY"
                  class="role-btn px-2 sm:px-3 py-1.5 sm:py-2 rounded-md font-semibold bg-pmcCream text-pmcPurple border border-pmcPurple hover:bg-pmcPurple hover:text-white transition shadow text-xs col-span-2">Faculty</button>
              </div>

              <!-- Department select (only for HOD & FACULTY) -->
              <div id="department-select-container" style="display:none;">
                <select
                  id="department-select"
                  class="w-full p-2.5 sm:p-3 bg-pmcCream border border-pmcMuted rounded-md text-pmcText focus:outline-none focus:ring-2 focus:ring-pmcPurple focus:border-transparent text-sm"
                >
                  <option value="" disabled selected>Select Department</option>
                  <option value="AERO">AERO</option>
                  <option value="AIDS">AIDS</option>
                  <option value="AIML">AIML</option>
                  <option value="CHEM">CHEM</option>
                  <option value="CIVIL">CIVIL</option>
                  <option value="CSBS">CSBS</option>
                  <option value="CSE">CSE</option>
                  <option value="ECE">ECE</option>
                  <option value="EEE">EEE</option>
                  <option value="IT">IT</option>
                  <option value="MBA">MBA</option>
                  <option value="MCA">MCA</option>
                  <option value="MCO">MCO</option>
                  <option value="MECH">MECH</option>
                  <option value="S&H V1">S&H V1</option>
                  <option value="S&H V2">S&H V2</option>
                  <option value="S&H V3">S&H V3</option>
                  <option value="S&H V4">S&H V4</option>
                  <option value="S&H V5">S&H V5</option>
                  <option value="S&H V6">S&H V6</option>
                </select>
              </div>
              
              <input
                type="email"
                id="email"
                placeholder="Enter your email address"
                required
                class="w-full p-2.5 sm:p-3 bg-pmcCream border border-pmcMuted rounded-md text-pmcText placeholder-pmcMuted focus:outline-none focus:ring-2 focus:ring-pmcPurple focus:border-transparent text-sm"
              />
              
              <button
                type="submit"
                id="send-code-btn"
                class="w-full bg-pmcBtn hover:bg-pmcBtnHover text-white font-semibold py-2.5 sm:py-3 rounded-md transition-all duration-200 shadow-lg text-sm"
              >Send Verification Code</button>
            </form>
          </div>
          
          <!-- Step 2: Enter Verification Code -->
          <div id="step-2" style="display: none;">
            <p class="text-pmcText text-sm mb-4 text-center">Enter the 6-digit verification code sent to your email</p>
            
            <form id="verify-code-form" class="space-y-4">
              <input
                type="text"
                id="verification-code"
                placeholder="Enter 6-digit verification code"
                maxlength="6"
                required
                class="w-full p-2.5 sm:p-3 bg-pmcCream border border-pmcMuted rounded-md text-pmcText placeholder-pmcMuted focus:outline-none focus:ring-2 focus:ring-pmcPurple focus:border-transparent text-sm text-center font-mono text-lg tracking-widest"
              />
              
              <button
                type="submit"
                id="verify-code-btn"
                class="w-full bg-pmcBtn hover:bg-pmcBtnHover text-white font-semibold py-2.5 sm:py-3 rounded-md transition-all duration-200 shadow-lg text-sm"
              >Verify Code</button>
              
              <div class="text-center">
                <button type="button" id="resend-code-btn" class="text-pmcPurple hover:text-pmcGreen font-medium transition-colors text-xs underline">
                  Resend Code
                </button>
              </div>
            </form>
          </div>
          
          <!-- Step 3: Reset Password -->
          <div id="step-3" style="display: none;">
            <p class="text-pmcText text-sm mb-4 text-center">Enter your new password</p>
            
            <form id="reset-password-form" class="space-y-4">
              <div class="relative">
                <input
                  type="password"
                  id="new-password"
                  placeholder="Enter new password"
                  required
                  minlength="6"
                  class="w-full p-2.5 sm:p-3 bg-pmcCream border border-pmcMuted rounded-md text-pmcText placeholder-pmcMuted focus:outline-none focus:ring-2 focus:ring-pmcPurple focus:border-transparent pr-10 text-sm"
                />
                <span
                  id="toggle-password1"
                  class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-pmcMuted hover:text-pmcPurple text-base"
                  title="Show/Hide Password"
                >👁</span>
              </div>
              
              <div class="relative">
                <input
                  type="password"
                  id="confirm-password"
                  placeholder="Confirm new password"
                  required
                  minlength="6"
                  class="w-full p-2.5 sm:p-3 bg-pmcCream border border-pmcMuted rounded-md text-pmcText placeholder-pmcMuted focus:outline-none focus:ring-2 focus:ring-pmcPurple focus:border-transparent pr-10 text-sm"
                />
                <span
                  id="toggle-password2"
                  class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-pmcMuted hover:text-pmcPurple text-base"
                  title="Show/Hide Password"
                >👁</span>
              </div>
              
              <button
                type="submit"
                id="reset-password-btn"
                class="w-full bg-pmcGreen hover:bg-green-600 text-white font-semibold py-2.5 sm:py-3 rounded-md transition-all duration-200 shadow-lg text-sm"
              >Reset Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIG ======
    const SUPABASE_URL = "https://cbhodgwaazmjszkujrti.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNiaG9kZ3dhYXptanN6a3VqcnRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU2NzY4NzEsImV4cCI6MjA3MTI1Mjg3MX0.sBRdfiWJJmZtLWsHCcNyxm1VcwkGwZWsIeeMlS49XTU";

    // ====== STATE ======
    let selectedRole = null;
    let userEmail = null;
    let verificationToken = null;

    // ====== INIT ======
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Role buttons
    document.querySelectorAll(".role-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const role = btn.getAttribute("data-role");
        setRole(role);
      });
    });

    function setRole(role) {
      selectedRole = role;
      // Remove active class from all buttons
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.remove('ring-2', 'ring-yellow-400');
      });
      // Add active class to selected button
      document.querySelector(`[data-role="${role}"]`).classList.add('ring-2', 'ring-yellow-400');
      
      const deptContainer = document.getElementById('department-select-container');
      if (role === 'HOD' || role === 'FACULTY') {
        deptContainer.style.display = '';
      } else {
        deptContainer.style.display = 'none';
      }
    }

    // Password toggle functionality
    document.getElementById('toggle-password1').addEventListener('click', () => {
      togglePassword('new-password');
    });

    document.getElementById('toggle-password2').addEventListener('click', () => {
      togglePassword('confirm-password');
    });

    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
    }

    function showAlert(message, type) {
      const container = document.getElementById('alert-container');
      const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
      container.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
      
      // Auto-hide after 5 seconds
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    function showStep(stepNumber) {
      document.getElementById('step-1').style.display = stepNumber === 1 ? 'block' : 'none';
      document.getElementById('step-2').style.display = stepNumber === 2 ? 'block' : 'none';
      document.getElementById('step-3').style.display = stepNumber === 3 ? 'block' : 'none';
    }

    // Step 1: Send verification code
    document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      console.log('[DEBUG] Form submitted');
      
      if (!selectedRole) {
        showAlert('Please select a role first.', 'error');
        return;
      }

      const email = document.getElementById('email').value.trim();
      const departmentSelect = document.getElementById('department-select');
      const department = (departmentSelect && departmentSelect.value) ? departmentSelect.value : '';

      console.log('[DEBUG] Form data:', { email, role: selectedRole, department });

      // HOD / FACULTY require department
      if ((selectedRole === 'HOD' || selectedRole === 'FACULTY') && !department) {
        showAlert('Please select a department.', 'error');
        return;
      }

      const btn = document.getElementById('send-code-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        console.log('[DEBUG] Making request to /forgot-password');
        
        const response = await fetch('/forgot-password', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            role: selectedRole,
            department: department
          })
        });

        console.log('[DEBUG] Response status:', response.status);
        console.log('[DEBUG] Response ok:', response.ok);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        console.log('[DEBUG] Response data:', data);
        console.log('[DEBUG] Success:', data.success);
        console.log('[DEBUG] Message:', data.message);

        if (data.success) {
          userEmail = email;
          showAlert('Verification code sent to your email!', 'success');
          showStep(2);
        } else {
          showAlert(data.message || 'Failed to send verification code.', 'error');
        }
      } catch (error) {
        console.error('[ERROR] Request failed:', error);
        showAlert(`Network error: ${error.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Verification Code';
      }
    });

    // Step 2: Verify code
    document.getElementById('verify-code-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = document.getElementById('verification-code').value.trim();
      
      if (code.length !== 6) {
        showAlert('Please enter a 6-digit verification code.', 'error');
        return;
      }

      const btn = document.getElementById('verify-code-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const response = await fetch('/verify-reset-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: userEmail,
            code: code,
            role: selectedRole
          })
        });

        const data = await response.json();

        if (data.success) {
          verificationToken = data.token;
          showAlert('Code verified! Now set your new password.', 'success');
          showStep(3);
        } else {
          showAlert(data.message || 'Invalid verification code.', 'error');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Verify Code';
      }
    });

    // Resend code
    document.getElementById('resend-code-btn').addEventListener('click', async () => {
      if (!userEmail) return;

      const btn = document.getElementById('resend-code-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const departmentSelect = document.getElementById('department-select');
        const department = (departmentSelect && departmentSelect.value) ? departmentSelect.value : '';
        
        const response = await fetch('/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: userEmail,
            role: selectedRole,
            department: department
          })
        });

        const data = await response.json();

        if (data.success) {
          showAlert('New verification code sent!', 'success');
        } else {
          showAlert('Failed to resend code.', 'error');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Resend Code';
      }
    });

    // Step 3: Reset password
    document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        showAlert('Passwords do not match.', 'error');
        return;
      }

      if (newPassword.length < 6) {
        showAlert('Password must be at least 6 characters long.', 'error');
        return;
      }

      const btn = document.getElementById('reset-password-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const response = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: userEmail,
            role: selectedRole,
            token: verificationToken,
            new_password: newPassword
          })
        });

        const data = await response.json();

        if (data.success) {
          showAlert('Password reset successfully! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showAlert(data.message || 'Failed to reset password.', 'error');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });

    // Only allow numbers in verification code
    document.getElementById('verification-code').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
    });
  </script>

  <!-- Footer -->
  <footer class="bg-pmcCard border-t border-pmcMuted/30 py-2">
    <div class="text-center px-4">
      <p class="text-xs text-pmcText">
        &copy; All Rights Reserved <a href="https://pmctech.org" target="_blank" class="underline text-pmcPurple hover:text-pmcGreen">PMC TECH</a>
      </p>
      <div class="flex items-center justify-center gap-1 mt-1">
        <span class="text-xs text-pmcMuted">Powered by</span>
        <a href="https://zeonytechnologies.com" target="_blank" rel="noopener noreferrer" class="inline-block hover:opacity-100 transition-all duration-300 hover:scale-105">
          <img src="/static/img/zeony logo.png" alt="Zeony Technologies" class="h-8 w-13 object-contain"/>
        </a>
      </div>
      <span class="text-xs text-pmcMuted t">A Student driven Software!</span>
    </div>
  </footer>
</body>
</html>
